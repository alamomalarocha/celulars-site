name: Validate CELULARS site

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          package-manager-cache: false

      - name: Validate source
        run: npm run validate

      - name: Build public artifact
        run: npm run build

      - name: Test local catalog manager
        run: npm run catalog:test

      - name: Test CPO CSV import and export
        run: npm run catalog:csv-test

      - name: Test private inventory manager
        run: npm run inventory:test

      - name: Test optional inventory by color
        run: npm run inventory:color-test

      - name: Confirm build output
        run: test -f dist/index.html && test -f dist/data/catalog-public.js
