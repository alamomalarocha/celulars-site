name: Validate CELULARS site

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate source
        run: npm run validate

      - name: Build public artifact
        run: npm run build

      - name: Confirm build output
        run: test -f dist/index.html && test -f dist/data/catalog-public.js
