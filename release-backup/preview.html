<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview CELULARS iPhones</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #111827;
        background: #f6f8fb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 32px;
      }

      main {
        width: min(100%, 520px);
        padding: 36px;
        border: 1px solid rgba(18, 61, 121, 0.12);
        border-radius: 18px;
        background: #ffffff;
        box-shadow: 0 24px 60px rgba(14, 22, 40, 0.1);
        text-align: center;
      }

      .eyebrow {
        display: block;
        margin-bottom: 10px;
        color: #123d79;
        font-size: 0.76rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(1.7rem, 4vw, 2.35rem);
      }

      p {
        margin: 0 0 24px;
        color: #5b6678;
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 0 22px;
        border-radius: 12px;
        background: #123d79;
        color: #ffffff;
        font-weight: 800;
        text-decoration: none;
        box-shadow: 0 16px 28px rgba(18, 61, 121, 0.18);
      }

      a:hover {
        background: #0e3162;
      }
    </style>
  </head>
  <body>
    <main>
      <span class="eyebrow">CELULARS</span>
      <h1>Preview iPhones</h1>
      <p>Abra a versão final pronta para teste local e para copiar no GoDaddy.</p>
      <a href="godaddy-iphones-final-test.html">Abrir teste da página iPhones</a>
    </main>
  </body>
</html>
